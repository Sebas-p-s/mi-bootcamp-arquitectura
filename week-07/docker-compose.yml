services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rechum}
      POSTGRES_USER: ${POSTGRES_USER:-rechum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-rechum} -d ${POSTGRES_DB:-rechum}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: node src/db/migrations.js
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-rechum}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-rechum}
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-rechum}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-rechum}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src:ro

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@rechum.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
